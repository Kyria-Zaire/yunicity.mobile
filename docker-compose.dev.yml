name: yunicity-dev

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: yunicity
      POSTGRES_USER: yunicity
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_local_only}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yunicity -d yunicity"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data_dev:
